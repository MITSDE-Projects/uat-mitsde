<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>n8n Chatbot</title>

    <!-- n8n Chat Styles -->
    <link
      href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Container for chatbot -->
    <div id="n8n-chat"></div>

    <!-- n8n Chat Script -->
    <script type="module">
      import { createChat } from "https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js";

      createChat({
        webhookUrl:
          "https://n8n.mitsde.com/webhook/01482fbc-257e-4af9-bcd2-8903923a88c9/chat",
        target: "#n8n-chat", // tells it where to mount
        // mode: "fullscreen",  // ✅ this shows the full chat window with input box
      });
    </script>
  </body>
</html>
