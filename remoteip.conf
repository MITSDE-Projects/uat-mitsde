# remoteip.conf

ServerName uat.mitsde.com

# Enable real IP from Traefik/Cloudflare proxy
RemoteIPHeader X-Forwarded-For
RemoteIPInternalProxy 10.0.0.0/8
RemoteIPInternalProxy 172.16.0.0/12
RemoteIPInternalProxy 192.168.0.0/16

# THIS LINE ADDED ↓ — overwrites REMOTE_ADDR automatically
RemoteIPProxiesHeader X-Forwarded-By

# If using Cloudflare, also add their IP ranges
RemoteIPTrustedProxy 103.21.244.0/22
RemoteIPTrustedProxy 103.22.200.0/22
RemoteIPTrustedProxy 141.101.64.0/18
RemoteIPTrustedProxy 108.162.192.0/18

# Log format showing real IP — changed %{X-Forwarded-For}i to %a
LogFormat "%a %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" realip
CustomLog /var/log/apache2/access.log realip
ErrorLog /var/log/apache2/error.log