<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Form Validation</title>

  <!-- ✅ Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- ✅ jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    .input-group.error .form-control,
    .input-group.error .form-select {
      border-color: #dc3545 !important;
      box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
    }

    .input-group-text {
      background-color: #f8f9fa;
    }

    .btn-main {
      background-color: #0d6efd;
      color: white;
    }

    .btn-main:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <form id="leadForm" novalidate>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="icon-name"></i></span>
        <input type="text" class="form-control" name="Name" placeholder="Name" autocomplete="on"/>
      </div>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="icon-email"></i></span>
        <input type="text" class="form-control" name="Email" placeholder="Email" autocomplete="on"/>
      </div>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="icon-phone"></i></span>
        <input type="text" class="form-control" name="Mobile" placeholder="Mobile" autocomplete="on"/>
      </div>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="icon-course"></i></span>
        <select name="Course" class="form-select">
          <option value="">Select Course</option>
          <option value="1">Option 1</option>
          <option value="2">Option 2</option>
        </select>
      </div>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="icon-institution"></i></span>
        <select name="Institution" class="form-select">
          <option value="">Select Institution</option>
          <option value="1">Option 1</option>
          <option value="2">Option 2</option>
        </select>
      </div>
      <div class="d-grid">
        <button class="btn btn-main" type="button" id="submitBtn">Register Now</button>
      </div>
    </form>
  </div>

  <script>
  $('#submitBtn').click(function () {
    let isValid = true;

    // Remove previous error states
    $('#leadForm .input-group').removeClass('error');

    // Check for empty fields
    $('#leadForm .form-control, #leadForm .form-select').each(function () {
      if (!$(this).val().trim()) {
        $(this).closest('.input-group').addClass('error');
        isValid = false;
      }
    });

    if (isValid) {
      alert('Form submitted successfully!');

      // ✅ Reset form
      $('#leadForm')[0].reset();

      // ✅ Remove all error styles if present (in case of previous tries)
      $('#leadForm .input-group').removeClass('error');
    } else {
      alert('Please fill all required fields.');
    }
  });
</script>

</body>
</html>
